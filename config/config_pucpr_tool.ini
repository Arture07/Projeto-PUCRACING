# Arquivo de Configuração para PUCPR Racing PyAnalysis Tool
# Edite os valores na seção [CHANNELS] para corresponder aos nomes das colunas no seu CSV.
# Edite [TRACK] com as coordenadas da linha de chegada.
# Edite [ANALYSIS] com parâmetros de análise.

[CHANNELS]
timestamp = Timestamp
gpslat = GPS_Lat
gpslon = GPS_Lon
gpsspeed = GPS_Speed
lataccel = IMU_AccelX
lonaccel = IMU_AccelY
vertaccel = IMU_AccelZ
yawrate = IMU_GyroZ
wheelspeedfl = WheelSpeed_FL
wheelspeedfr = WheelSpeed_FR
wheelspeedrl = WheelSpeed_RL
wheelspeedrr = WheelSpeed_RR
suspposfl = SuspensionPos_FL
suspposfr = SuspensionPos_FR
suspposrl = SuspensionPos_RL
suspposrr = SuspensionPos_RR
steerangle = SteeringAngle
throttlepos = ThrottlePos
brakepressf = BrakePressure_F
enginerpm = EngineRPM
coolanttemp = CoolantTemp
vehiclespeed = VehicleSpeed

[TRACK]
startfinishlat = -25.45000
startfinishlon = -49.23000

[ANALYSIS]
skidpadradius = 9.0
lapdetectionthresholdmeters = 10.0
minlaptimeseconds = 20.0

[INFLUXDB]
enabled = false
url = http://localhost:8086
token =
org = pucpr-racing
bucket = telemetry
measurement = telemetry_live
flush_interval_ms = 50
max_queue_size = 2000

[GRAFANA]
enabled = false
url = http://localhost:3000/d/pucpr-telemetry-live
query = orgId=1&refresh=500ms
title = PUCPR Racing - Grafana Live
width = 1300
height = 820

